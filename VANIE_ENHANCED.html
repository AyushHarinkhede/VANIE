<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANIE - Advanced AI Assistant</title>
    
    <!-- External Libraries for Modern Features -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #2d3748 100%);
            color: #e2e8f0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .chat-container {
            width: 100%;
            max-width: 900px;
            height: 95vh;
            background: rgba(26, 32, 46, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 20px 20px 0 0;
        }
        
        .chat-header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .chat-header p {
            margin: 5px 0 0 0;
            opacity: 0.9;
            font-size: 14px;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #1a1a2e;
            position: relative;
        }
        
        /* Welcome/Suggested Prompts Container */
        .welcome-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 20px;
            padding: 20px;
        }
        
        .welcome-title {
            font-size: 28px;
            font-weight: 300;
            margin-bottom: 30px;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .suggested-prompts {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 600px;
        }
        
        .prompt-chip {
            background: rgba(102, 126, 234, 0.1);
            border: 1px solid rgba(102, 126, 234, 0.3);
            color: #667eea;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
        }
        
        .prompt-chip:hover {
            background: rgba(102, 126, 234, 0.2);
            border-color: rgba(102, 126, 234, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }
        
        .message {
            margin: 15px 0;
            padding: 15px 20px;
            border-radius: 18px;
            max-width: 85%;
            word-wrap: break-word;
            position: relative;
            animation: fadeIn 0.3s ease-in;
        }
        
        .message.user {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-left: auto;
            text-align: right;
        }
        
        .message.bot {
            background: #2d3748;
            color: #e2e8f0;
            margin-right: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .message-content {
            margin-bottom: 8px;
            line-height: 1.6;
        }
        
        /* Markdown Styling */
        .message-content h1, .message-content h2, .message-content h3 {
            color: #667eea;
            margin: 10px 0 5px 0;
            font-weight: 600;
        }
        
        .message-content h1 { font-size: 1.5em; }
        .message-content h2 { font-size: 1.3em; }
        .message-content h3 { font-size: 1.1em; }
        
        .message-content ul, .message-content ol {
            margin: 10px 0;
            padding-left: 25px;
        }
        
        .message-content li {
            margin: 5px 0;
        }
        
        .message-content strong {
            color: #667eea;
            font-weight: 600;
        }
        
        .message-content em {
            color: #a78bfa;
            font-style: italic;
        }
        
        /* Code Blocks */
        .message-content pre {
            background: #1e293b;
            border: 1px solid #374151;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
            overflow-x: auto;
            position: relative;
        }
        
        .message-content code {
            background: rgba(110, 118, 129, 0.1);
            color: #e2e8f0;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 0.9em;
        }
        
        .message-content pre code {
            background: transparent;
            padding: 0;
        }
        
        /* Copy Button for Code Blocks */
        .copy-button {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.3);
            color: #667eea;
            padding: 5px 10px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
        }
        
        .copy-button:hover {
            background: rgba(102, 126, 234, 0.3);
            border-color: rgba(102, 126, 234, 0.5);
        }
        
        /* Message Actions */
        .message-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .message:hover .message-actions {
            opacity: 1;
        }
        
        .action-icon {
            width: 24px;
            height: 24px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            font-size: 12px;
        }
        
        .action-icon:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }
        
        /* Timestamp */
        .message-timestamp {
            font-size: 11px;
            color: #718096;
            margin-top: 5px;
            text-align: right;
            font-family: 'Consolas', 'Monaco', monospace;
        }
        
        .message.user .message-timestamp {
            text-align: right;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .message.bot .message-timestamp {
            text-align: left;
        }
        
        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 15px 20px;
            background: #2d3748;
            border-radius: 18px;
            margin: 10px 0;
            max-width: fit-content;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .typing-dots {
            display: flex;
            gap: 4px;
        }
        
        .typing-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            animation: typing 1.4s infinite;
        }
        
        .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.3;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Connection Status */
        .connection-status {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .connection-status.connected {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }
        
        .connection-status.disconnected {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        .status-dot.connected {
            background: #22c55e;
        }
        
        .status-dot.disconnected {
            background: #ef4444;
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        
        /* Input Container */
        .chat-input-container {
            background: #1f2937;
            padding: 20px;
            border-radius: 0 0 20px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .input-group {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        #messageInput {
            flex: 1;
            padding: 15px 20px;
            background: #374151;
            border: 2px solid #4b5563;
            border-radius: 25px;
            font-size: 16px;
            color: #e2e8f0;
            outline: none;
            transition: all 0.3s ease;
        }
        
        #messageInput:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        #messageInput::placeholder {
            color: #9ca3af;
        }
        
        #sendButton {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        
        #sendButton:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        
        #sendButton:active {
            transform: translateY(0);
        }
        
        /* Scrollbar Styling */
        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }
        
        .chat-messages::-webkit-scrollbar-track {
            background: #1a1a2e;
        }
        
        .chat-messages::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 4px;
        }
        
        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #667eea;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🤖 VANIE</h1>
            <p>Advanced AI Assistant by Ayush Harinkhede</p>
        </div>
        
        <div id="chatMessages" class="chat-messages">
            <!-- Welcome Screen with Suggested Prompts -->
            <div id="welcomeContainer" class="welcome-container">
                <div class="welcome-title">Welcome to VANIE</div>
                <div class="suggested-prompts">
                    <div class="prompt-chip" onclick="sendPrompt('Tell me a joke')">
                        😄 Tell me a joke
                    </div>
                    <div class="prompt-chip" onclick="sendPrompt('Who made you?')">
                        🤔 Who made you?
                    </div>
                    <div class="prompt-chip" onclick="sendPrompt('Help me with Python code')">
                        🐍 Help me with Python code
                    </div>
                    <div class="prompt-chip" onclick="sendPrompt('What can you do?')">
                        ⚡ What can you do?
                    </div>
                </div>
            </div>
        </div>
        
        <div class="chat-input-container">
            <div class="input-group">
                <input type="text" id="messageInput" placeholder="Type your message here..." autocomplete="off">
                <button id="sendButton" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>
    
    <div id="connectionStatus" class="connection-status disconnected">
        <div class="status-dot disconnected"></div>
        <span>Disconnected</span>
    </div>
    
    <script>
        // VANIE Enhanced Frontend with Modern Features
        class VANIEEnhancedFrontend {
            constructor() {
                this.apiBaseUrl = 'http://127.0.0.1:5000';
                this.sessionId = this.generateSessionId();
                this.lastUserMessage = '';
                this.hasInteracted = false;
            }
            
            generateSessionId() {
                return 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            }
            
            // 1. Typing Indicator with Animated Bouncing Dots
            showTypingIndicator() {
                const chatContainer = document.getElementById('chatMessages');
                const typingHtml = `
                    <div class="typing-indicator">
                        <div class="typing-dots">
                            <span></span>
                            <span></span>
                            <span></span>
                        </div>
                        <span>VANIE is typing...</span>
                    </div>
                `;
                
                // Insert typing indicator at the end of chat
                chatContainer.insertAdjacentHTML('beforeend', typingHtml);
                this.autoScrollToBottom();
            }
            
            hideTypingIndicator() {
                const typingIndicator = document.querySelector('.typing-indicator');
                if (typingIndicator) {
                    typingIndicator.remove();
                }
            }
            
            // 2. Markdown Parsing & Code Highlighting
            parseMarkdownAndHighlight(message) {
                // Use marked.js for markdown parsing
                let html = marked.parse(message);
                
                // Create a temporary div to parse HTML
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = html;
                
                // Apply syntax highlighting to code blocks
                tempDiv.querySelectorAll('pre code').forEach((codeBlock) => {
                    // Add copy button to code blocks
                    const pre = codeBlock.parentElement;
                    const copyButton = document.createElement('div');
                    copyButton.className = 'copy-button';
                    copyButton.innerHTML = '📋 Copy';
                    copyButton.onclick = () => this.copyCode(codeBlock.textContent);
                    pre.style.position = 'relative';
                    pre.appendChild(copyButton);
                    
                    // Apply highlight.js
                    hljs.highlightElement(codeBlock);
                });
                
                return tempDiv.innerHTML;
            }
            
            copyCode(code) {
                navigator.clipboard.writeText(code).then(() => {
                    // Show success feedback
                    this.showToast('Code copied to clipboard! 📋');
                }).catch(err => {
                    console.error('Failed to copy code:', err);
                    this.showToast('Failed to copy code ❌');
                });
            }
            
            showToast(message) {
                // Create toast notification
                const toast = document.createElement('div');
                toast.style.cssText = `
                    position: fixed;
                    bottom: 20px;
                    left: 50%;
                    transform: translateX(-50%);
                    background: rgba(34, 197, 94, 0.9);
                    color: white;
                    padding: 12px 20px;
                    border-radius: 8px;
                    font-size: 14px;
                    z-index: 1000;
                    animation: slideUp 0.3s ease-out;
                `;
                toast.textContent = message;
                document.body.appendChild(toast);
                
                setTimeout(() => {
                    toast.remove();
                }, 2000);
            }
            
            // 3. Message Action Icons (Copy & Regenerate)
            createMessageActions(message, isUser = false) {
                const actions = document.createElement('div');
                actions.className = 'message-actions';
                
                // Copy Icon
                const copyIcon = document.createElement('div');
                copyIcon.className = 'action-icon';
                copyIcon.innerHTML = '📋';
                copyIcon.title = 'Copy message';
                copyIcon.onclick = () => {
                    navigator.clipboard.writeText(message).then(() => {
                        this.showToast('Message copied! 📋');
                    });
                };
                
                actions.appendChild(copyIcon);
                
                // Regenerate Icon (only for bot messages)
                if (!isUser && this.lastUserMessage) {
                    const regenerateIcon = document.createElement('div');
                    regenerateIcon.className = 'action-icon';
                    regenerateIcon.innerHTML = '🔄';
                    regenerateIcon.title = 'Regenerate response';
                    regenerateIcon.onclick = () => {
                        this.regenerateResponse();
                    };
                    actions.appendChild(regenerateIcon);
                }
                
                return actions;
            }
            
            regenerateResponse() {
                if (this.lastUserMessage) {
                    this.sendMessage(this.lastUserMessage);
                    this.showToast('Regenerating response... 🔄');
                }
            }
            
            // 4. Dynamic Timestamps
            createTimestamp() {
                const now = new Date();
                return now.toLocaleTimeString('en-US', {
                    hour12: false,
                    hour: '2-digit',
                    minute: '2-digit'
                });
            }
            
            // 5. Smart Auto-Scroll to Bottom
            autoScrollToBottom() {
                const chatContainer = document.getElementById('chatMessages');
                setTimeout(() => {
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }, 100);
            }
            
            // 6. Welcome/Suggested Prompts
            hideWelcomeScreen() {
                const welcomeContainer = document.getElementById('welcomeContainer');
                if (welcomeContainer) {
                    welcomeContainer.style.display = 'none';
                }
            }
            
            async sendMessage(userMessage) {
                if (!userMessage || userMessage.trim() === '') return;
                
                // Store last user message for regenerate functionality
                this.lastUserMessage = userMessage;
                
                // Hide welcome screen on first interaction
                if (!this.hasInteracted) {
                    this.hideWelcomeScreen();
                    this.hasInteracted = true;
                }
                
                // Add user message
                this.addMessage(userMessage, 'user');
                
                // Clear input
                document.getElementById('messageInput').value = '';
                
                // Show typing indicator
                this.showTypingIndicator();
                
                try {
                    // Send to backend
                    const response = await fetch(`${this.apiBaseUrl}/chat`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            message: userMessage,
                            session_id: this.sessionId
                        })
                    });
                    
                    const data = await response.json();
                    
                    // Hide typing indicator
                    this.hideTypingIndicator();
                    
                    if (data.status === 'success') {
                        this.addMessage(data.response, 'bot', data);
                    } else {
                        this.addMessage('Sorry, I encountered an error. Please try again.', 'bot');
                    }
                    
                } catch (error) {
                    console.error('Error sending message:', error);
                    this.hideTypingIndicator();
                    this.addMessage('Connection error. Please check if the backend is running.', 'bot');
                }
            }
            
            addMessage(text, sender, metadata = {}) {
                const chatContainer = document.getElementById('chatMessages');
                
                // Create message element
                const messageElement = document.createElement('div');
                messageElement.className = `message ${sender}`;
                
                // Parse markdown and highlight code for bot messages
                const content = sender === 'bot' ? this.parseMarkdownAndHighlight(text) : text;
                
                messageElement.innerHTML = `
                    <div class="message-content">${content}</div>
                    ${sender === 'bot' ? this.createMessageActions(text, false).outerHTML : ''}
                    <div class="message-timestamp">${this.createTimestamp()}</div>
                `;
                
                chatContainer.appendChild(messageElement);
                this.autoScrollToBottom();
            }
            
            async checkBackendHealth() {
                try {
                    const response = await fetch(`${this.apiBaseUrl}/health`);
                    const data = await response.json();
                    
                    if (data.status === 'healthy') {
                        this.updateConnectionStatus(true);
                        return true;
                    } else {
                        this.updateConnectionStatus(false);
                        return false;
                    }
                } catch (error) {
                    this.updateConnectionStatus(false);
                    return false;
                }
            }
            
            updateConnectionStatus(isConnected) {
                const statusElement = document.getElementById('connectionStatus');
                const statusDot = statusElement.querySelector('.status-dot');
                
                if (isConnected) {
                    statusElement.className = 'connection-status connected';
                    statusDot.className = 'status-dot connected';
                    statusElement.innerHTML = `
                        <div class="status-dot connected"></div>
                        <span>Connected</span>
                    `;
                } else {
                    statusElement.className = 'connection-status disconnected';
                    statusDot.className = 'status-dot disconnected';
                    statusElement.innerHTML = `
                        <div class="status-dot disconnected"></div>
                        <span>Disconnected</span>
                    `;
                }
            }
        }
        
        // Initialize VANIE Enhanced Frontend
        const vanie = new VANIEEnhancedFrontend();
        
        // Send prompt from welcome chips
        function sendPrompt(prompt) {
            document.getElementById('messageInput').value = prompt;
            sendMessage();
        }
        
        // Main send message function
        async function sendMessage() {
            const inputElement = document.getElementById('messageInput');
            const message = inputElement.value.trim();
            
            if (message === '') return;
            
            await vanie.sendMessage(message);
        }
        
        // Handle Enter key press
        document.getElementById('messageInput').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        });
        
        // Check backend health on page load
        document.addEventListener('DOMContentLoaded', function() {
            vanie.checkBackendHealth();
            
            // Check health every 30 seconds
            setInterval(() => {
                vanie.checkBackendHealth();
            }, 30000);
        });
        
        // Add CSS animation for toast notifications
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideUp {
                from {
                    transform: translate(-50%, 100%);
                    opacity: 0;
                }
                to {
                    transform: translate(-50%, 0);
                    opacity: 1;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANIE - Advanced AI Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 20px 20px 0 0;
        }
        
        .chat-header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }
        
        .chat-header p {
            margin: 5px 0 0 0;
            opacity: 0.9;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        
        .message {
            margin: 10px 0;
            padding: 12px 16px;
            border-radius: 18px;
            max-width: 80%;
            word-wrap: break-word;
            position: relative;
            animation: fadeIn 0.3s ease-in;
        }
        
        .message.user {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-left: auto;
            text-align: right;
        }
        
        .message.bot {
            background: white;
            color: #333;
            margin-right: auto;
            border: 1px solid #e9ecef;
        }
        
        .message-content {
            margin-bottom: 4px;
        }
        
        .message-time {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
        }
        
        .message.user .message-time {
            color: rgba(255, 255, 255, 0.7);
            text-align: right;
        }
        
        .message-meta {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            font-size: 11px;
            opacity: 0.7;
        }
        
        .intent-info {
            background-color: #e9ecef;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: bold;
        }
        
        .emotion-info {
            background-color: #fff3cd;
            padding: 2px 6px;
            border-radius: 10px;
            color: #856404;
        }
        
        .confidence-score {
            background-color: #d4edda;
            padding: 2px 6px;
            border-radius: 10px;
            color: #155724;
        }
        
        .chat-input-container {
            background: white;
            padding: 20px;
            border-radius: 0 0 20px 20px;
            border-top: 1px solid #e9ecef;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
        }
        
        #messageInput {
            flex: 1;
            padding: 15px;
            border: 2px solid #e9ecef;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        #messageInput:focus {
            border-color: #667eea;
        }
        
        #sendButton {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        #sendButton:hover {
            transform: translateY(-2px);
        }
        
        .connection-status {
            position: fixed;
            top: 10px;
            left: 10px;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            z-index: 1000;
        }
        
        .connection-status.connected {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .connection-status.disconnected {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .typing-indicator {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 15px 25px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: none;
            align-items: center;
            gap: 10px;
        }
        
        .typing-dots {
            display: inline-flex;
            gap: 4px;
        }
        
        .typing-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #667eea;
            animation: typing 1.4s infinite;
        }
        
        .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.3;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .error-notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #f8d7da;
            color: #721c24;
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid #f5c6cb;
            z-index: 1000;
            animation: slideUp 0.3s ease-out;
        }
        
        @keyframes slideUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🤖 VANIE</h1>
            <p>Advanced AI Assistant by Ayush Harinkhede</p>
        </div>
        
        <div id="chatMessages" class="chat-messages">
            <!-- Messages will appear here -->
        </div>
        
        <div class="chat-input-container">
            <div class="input-group">
                <input type="text" id="messageInput" placeholder="Type your message here..." autocomplete="off">
                <button id="sendButton" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>
    
    <div id="connectionStatus"></div>
    <div id="typingIndicator" class="typing-indicator">
        <div class="typing-dots">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <span>VANIE is typing...</span>
    </div>
    
    <script>
        // VANIE Frontend Integration
        class VANIEFrontend {
            constructor() {
                this.apiBaseUrl = 'http://127.0.0.1:5000';
                this.sessionId = this.generateSessionId();
            }
            
            generateSessionId() {
                return 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            }
            
            async sendMessage(userMessage) {
                try {
                    // Show typing indicator
                    this.showTypingIndicator();
                    
                    // Send message to VANIE backend
                    const response = await fetch(`${this.apiBaseUrl}/chat`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            message: userMessage,
                            session_id: this.sessionId
                        })
                    });
                    
                    const data = await response.json();
                    
                    // Hide typing indicator
                    this.hideTypingIndicator();
                    
                    if (data.status === 'success') {
                        this.displayResponse(data);
                        return data;
                    } else {
                        throw new Error(data.error || 'Unknown error');
                    }
                    
                } catch (error) {
                    console.error('Error sending message:', error);
                    this.hideTypingIndicator();
                    this.showError('Failed to connect to VANIE. Please check if the backend is running.');
                    throw error;
                }
            }
            
            showTypingIndicator() {
                const typingElement = document.getElementById('typingIndicator');
                if (typingElement) {
                    typingElement.style.display = 'flex';
                }
            }
            
            hideTypingIndicator() {
                const typingElement = document.getElementById('typingIndicator');
                if (typingElement) {
                    typingElement.style.display = 'none';
                }
            }
            
            displayResponse(data) {
                const chatContainer = document.getElementById('chatMessages');
                if (!chatContainer) return;
                
                // Create message element
                const messageElement = document.createElement('div');
                messageElement.className = 'message bot';
                
                // Add intent info if available
                let intentInfo = '';
                if (data.detected_intents && data.detected_intents.length > 0) {
                    intentInfo = `<div class="intent-info">Intent: ${data.detected_intents.join(', ')}</div>`;
                }
                
                // Add emotion info if available
                let emotionInfo = '';
                if (data.emotion && data.emotion.emotion !== 'neutral') {
                    const emotionIcons = {
                        'happy': '😊',
                        'sad': '😢',
                        'angry': '😠',
                        'excited': '🎉'
                    };
                    emotionInfo = `<div class="emotion-info">Emotion: ${emotionIcons[data.emotion.emotion] || ''}</div>`;
                }
                
                messageElement.innerHTML = `
                    <div class="message-content">
                        ${intentInfo}
                        ${emotionInfo}
                        <div class="message-text">${data.response}</div>
                        <div class="message-meta">
                            <span class="confidence-score">Confidence: ${Math.round((data.confidence || 0) * 100)}%</span>
                            <span class="timestamp">${new Date().toLocaleTimeString()}</span>
                        </div>
                    </div>
                `;
                
                chatContainer.appendChild(messageElement);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
            
            showError(message) {
                const errorElement = document.createElement('div');
                errorElement.className = 'error-notification';
                errorElement.innerHTML = `
                    <span class="error-icon">⚠️</span>
                    <span class="error-text">${message}</span>
                `;
                
                document.body.appendChild(errorElement);
                
                setTimeout(() => {
                    errorElement.remove();
                }, 5000);
            }
            
            async checkBackendHealth() {
                try {
                    const response = await fetch(`${this.apiBaseUrl}/health`);
                    const data = await response.json();
                    
                    if (data.status === 'healthy') {
                        this.showConnectionStatus('connected');
                        return true;
                    } else {
                        this.showConnectionStatus('disconnected');
                        return false;
                    }
                } catch (error) {
                    this.showConnectionStatus('disconnected');
                    return false;
                }
            }
            
            showConnectionStatus(status) {
                const statusElement = document.getElementById('connectionStatus');
                if (statusElement) {
                    if (status === 'connected') {
                        statusElement.className = 'connection-status connected';
                        statusElement.innerHTML = '🟢 Connected to VANIE';
                    } else {
                        statusElement.className = 'connection-status disconnected';
                        statusElement.innerHTML = '🔴 Disconnected from VANIE';
                    }
                }
            }
        }
        
        // Initialize VANIE Frontend
        const vanieFrontend = new VANIEFrontend();
        
        // Add message to chat
        function addMessage(text, sender) {
            const chatContainer = document.getElementById('chatMessages');
            if (!chatContainer) return;
            
            const messageElement = document.createElement('div');
            messageElement.className = `message ${sender}`;
            messageElement.innerHTML = `
                <div class="message-content">${text}</div>
                <div class="message-time">${new Date().toLocaleTimeString()}</div>
            `;
            
            chatContainer.appendChild(messageElement);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        // Main send message function
        async function sendMessage() {
            const inputElement = document.getElementById('messageInput');
            const message = inputElement.value.trim();
            
            if (message === '') return;
            
            // Show user message
            addMessage(message, 'user');
            
            // Clear input
            inputElement.value = '';
            
            try {
                // Get response from VANIE backend
                await vanieFrontend.sendMessage(message);
            } catch (error) {
                console.error('Error in sendMessage:', error);
                // Fallback response
                addMessage("I'm having trouble connecting right now. Please try again in a moment.", 'bot');
            }
        }
        
        // Handle Enter key press
        document.getElementById('messageInput').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        });
        
        // Check backend health on page load
        document.addEventListener('DOMContentLoaded', function() {
            vanieFrontend.checkBackendHealth();
            
            // Check health every 30 seconds
            setInterval(() => {
                vanieFrontend.checkBackendHealth();
            }, 30000);
        });
    </script>
</body>
</html>
